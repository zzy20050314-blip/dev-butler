<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的专属开发管家</title>
<style>
  :root {
    --bg: #0d0f1a; --bg2: #13162a; --bg3: #1a1e35; --bg4: #20243d;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --text2: #b0b5cc;
    --text-muted: #7a7f99; --accent: #6c63ff; --accent2: #a78bfa;
    --accent-glow: rgba(108,99,255,0.15); --gold: #f5a623; --coral: #ff7e5f;
    --bluepurple: #7c6af7; --teal: #4ecdc4; --rose: #f06292; --slate: #5c8fff;
    --success: #4ade80; --danger: #ef4444; --sidebar-w: 300px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; overflow: hidden;
  }
  .sidebar {
    width: var(--sidebar-w); background: var(--bg2);
    border-right: 1px solid var(--border); display: flex;
    flex-direction: column; flex-shrink: 0; z-index: 10;
  }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .sidebar-logo-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .sidebar-logo-text { font-size: 14px; font-weight: 700; }
  .sidebar-logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }
  .sidebar-new-chat {
    width: 100%; padding: 9px; border-radius: 10px; cursor: pointer; font-size: 12px;
    background: rgba(108,99,255,0.08); border: 1px dashed rgba(108,99,255,0.2);
    color: var(--accent2); display: flex; align-items: center; justify-content: center;
    gap: 5px; transition: all 0.2s;
  }
  .sidebar-new-chat:hover { background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.35); }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .sidebar-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 11px; color: var(--text-muted);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
    background: none; border-top: none; font-family: inherit;
  }
  .sidebar-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 6px; }
  .sidebar-content::-webkit-scrollbar { width: 4px; }
  .sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .expert-list-item {
    display: flex; align-items: center; gap: 9px; padding: 9px 11px;
    border-radius: 9px; cursor: pointer; transition: all 0.15s; margin-bottom: 1px;
  }
  .expert-list-item:hover { background: var(--bg3); }
  .expert-list-item.active { background: var(--accent-glow); }
  .expert-list-item .expert-emoji {
    width: 30px; height: 30px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
  }
  .expert-list-item .expert-info { flex: 1; min-width: 0; }
  .expert-list-item .expert-list-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expert-list-item .expert-list-role { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dept-group-title {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.6px; padding: 8px 12px 4px; font-weight: 600;
  }
  .session-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 8px;
    cursor: pointer; transition: all 0.15s; margin-bottom: 1px; position: relative;
  }
  .session-item:hover { background: var(--bg3); }
  .session-item.active { background: var(--accent-glow); }
  .session-item .session-info { flex: 1; min-width: 0; }
  .session-item .session-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .session-meta { font-size: 10px; color: var(--text-muted); }
  .session-delete {
    opacity: 0; width: 22px; height: 22px; border-radius: 5px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 11px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
  }
  .session-item:hover .session-delete { opacity: 1; }
  .session-delete:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

  .sidebar-footer {
    padding: 8px 12px; border-top: 1px solid var(--border); font-size: 10px;
    color: var(--text-muted); display: flex; align-items: center; justify-content: space-between;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--success);
    display: inline-block; margin-right: 4px;
  }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 50px; border-bottom: 1px solid var(--border); display: flex;
    align-items: center; padding: 0 18px; gap: 10px; flex-shrink: 0; background: var(--bg);
  }
  .topbar-expert { display: flex; align-items: center; gap: 9px; }
  .topbar-expert-emoji { font-size: 18px; }
  .topbar-expert-name { font-size: 13px; font-weight: 600; }
  .topbar-expert-role { font-size: 10px; color: var(--text-muted); }
  .topbar-actions { margin-left: auto; display: flex; gap: 6px; }
  .topbar-btn {
    height: 28px; padding: 0 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 11px;
    display: flex; align-items: center; gap: 3px; transition: all 0.15s; font-family: inherit;
  }
  .topbar-btn:hover { border-color: rgba(255,255,255,0.12); color: var(--text2); }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 18px; display: flex;
    flex-direction: column; gap: 14px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 30px; text-align: center;
  }
  .empty-state-icon { font-size: 50px; margin-bottom: 14px; opacity: 0.6; }
  .empty-state-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .empty-state-desc { font-size: 13px; color: var(--text-muted); max-width: 380px; line-height: 1.6; margin-bottom: 20px; }
  .empty-prompts { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; max-width: 480px; width: 100%; }
  .empty-prompt {
    padding: 9px 12px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); cursor: pointer; font-size: 11px;
    text-align: left; transition: all 0.15s; line-height: 1.4; font-family: inherit;
  }
  .empty-prompt:hover { border-color: rgba(108,99,255,0.3); background: rgba(108,99,255,0.05); color: var(--accent2); }

  .message { display: flex; gap: 10px; max-width: 85%; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }
  .message-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    flex-shrink: 0; margin-top: 2px;
  }
  .message.user .message-avatar { background: rgba(108,99,255,0.15); }
  .message.assistant .message-avatar { background: var(--bg3); border: 1px solid var(--border); }
  .message-bubble {
    padding: 11px 15px; border-radius: 13px; font-size: 13px;
    line-height: 1.6; word-break: break-word;
  }
  .message.user .message-bubble {
    background: linear-gradient(135deg, var(--accent), var(--bluepurple));
    border-bottom-right-radius: 4px;
  }
  .message.assistant .message-bubble {
    background: var(--bg2); border: 1px solid var(--border); border-bottom-left-radius: 4px;
  }
  .message-bubble h1,.message-bubble h2,.message-bubble h3 { margin: 6px 0 3px; font-size: 14px; font-weight: 700; }
  .message-bubble ul,.message-bubble ol { margin: 5px 0; padding-left: 18px; }
  .message-bubble li { margin: 1px 0; }
  .message-bubble code { background: var(--bg4); padding: 1px 5px; border-radius: 3px; font-size: 11px; font-family: 'Fira Code','Cascadia Code',monospace; }
  .message-bubble pre { background: var(--bg4); padding: 10px; border-radius: 7px; overflow-x: auto; margin: 6px 0; font-size: 11px; font-family: 'Fira Code','Cascadia Code',monospace; line-height: 1.5; }
  .message-bubble pre code { background: none; padding: 0; }
  .message-bubble p { margin: 3px 0; }
  .message-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; margin: 6px 0; color: var(--text-muted); }
  .message-bubble table { width: 100%; border-collapse: collapse; margin: 6px 0; font-size: 11px; }
  .message-bubble th,.message-bubble td { padding: 5px 8px; border: 1px solid var(--border); text-align: left; }
  .message-bubble th { background: var(--bg3); font-weight: 600; }
  .message-time { font-size: 9px; color: var(--text-muted); margin-top: 3px; }

  .typing-dots { display: flex; gap: 3px; padding: 3px 0; }
  .typing-dots span { width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .input-area { border-top: 1px solid var(--border); padding: 12px 18px; background: var(--bg); flex-shrink: 0; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-box {
    flex: 1; min-height: 40px; max-height: 140px; padding: 9px 12px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 13px; font-family: inherit; resize: none;
    outline: none; line-height: 1.5; transition: border-color 0.2s;
  }
  .input-box:focus { border-color: rgba(108,99,255,0.4); }
  .input-box::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--bluepurple)); color: white;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(108,99,255,0.35); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .send-btn.stop { background: var(--danger); }
  .input-hint { font-size: 9px; color: var(--text-muted); margin-top: 5px; text-align: center; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; max-width: 440px; width: calc(100% - 36px); text-align: center;
  }
  .modal h3 { font-size: 15px; margin-bottom: 8px; }
  .modal p { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--bluepurple)); color: white; border: none; padding: 9px 24px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 16px; font-size: 12px; color: var(--text); z-index: 9999;
    transition: transform 0.3s; box-shadow: 0 4px 18px rgba(0,0,0,0.4); pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .menu-toggle {
    display: none; position: fixed; top: 8px; left: 8px; z-index: 500;
    width: 34px; height: 34px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); cursor: pointer; font-size: 16px;
    align-items: center; justify-content: center;
  }
  .code-block-wrapper { position: relative; }
  .copy-btn {
    position: absolute; top: 4px; right: 6px; font-size: 9px; padding: 1px 6px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-muted); cursor: pointer; opacity: 0; transition: opacity 0.2s;
  }
  .code-block-wrapper:hover .copy-btn { opacity: 1; }
  .sidebar-online-badge {
    font-size: 9px; color: var(--success); background: rgba(74,222,128,0.1);
    padding: 0 5px; border-radius: 3px; margin-left: 4px;
  }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; transition: left 0.3s; width: 270px; }
    .sidebar.open { left: 0; }
    .menu-toggle { display: flex; }
    .topbar { padding-left: 48px; }
    .message { max-width: 95%; }
    .empty-prompts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🏢</div>
      <div>
        <div class="sidebar-logo-text">你的专属开发管家 <span class="sidebar-online-badge" id="online-badge" style="display:none">在线</span></div>
        <div class="sidebar-logo-sub">Dev Butler · 16位AI专家</div>
      </div>
    </div>
    <button class="sidebar-new-chat" onclick="newChat()">✨ 新建对话</button>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" onclick="switchTab('experts')" id="tab-experts">👥 专家</button>
    <button class="sidebar-tab" onclick="switchTab('history')" id="tab-history">💬 历史</button>
  </div>
  <div class="sidebar-content" id="sidebar-content">
    <div id="expert-list"><div style="text-align:center;color:var(--text-muted);padding:30px;font-size:11px;">加载专家列表中...</div></div>
    <div id="session-list" style="display:none"><div style="text-align:center;color:var(--text-muted);padding:30px;font-size:11px;">暂无历史对话</div></div>
  </div>
  <div class="sidebar-footer">
    <span id="footer-status"><span class="status-dot"></span>连接中...</span>
    <span style="font-size:9px;color:var(--text-muted)">数据存于服务器</span>
  </div>
</aside>

<main class="main">
  <div class="topbar" id="topbar">
    <div class="topbar-expert" id="topbar-expert" style="display:none">
      <span class="topbar-expert-emoji" id="topbar-emoji"></span>
      <div>
        <div class="topbar-expert-name" id="topbar-name"></div>
        <div class="topbar-expert-role" id="topbar-role"></div>
      </div>
    </div>
    <div id="topbar-empty" style="color:var(--text-muted);font-size:12px;">选择一位专家开始对话</div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="shareChat()" id="btn-share" disabled>🔗 分享</button>
      <button class="topbar-btn" onclick="clearChat()" id="btn-clear" disabled>🗑 清空</button>
    </div>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">👋</div>
      <div class="empty-state-title">欢迎来到你的专属开发管家</div>
      <div class="empty-state-desc">
        16位AI专家，覆盖战略、产品、研发、测试、运维全流程。<br>
        选择左侧专家开始对话——无需配置，打开即用。
      </div>
      <div class="empty-prompts">
        <div class="empty-prompt" onclick="quickStart('ai-dispatcher','我不知道找谁，帮我分析一下需求')">🎯 不知道找谁？先问调度官 ARIA</div>
        <div class="empty-prompt" onclick="quickStart('backend-developer','帮我设计一个 Web 应用的架构方案')">💻 来，帮我设计个架构方案</div>
        <div class="empty-prompt" onclick="quickStart('senior-product-manager','帮我写一份新功能的产品需求文档')">📋 帮我写个产品需求文档</div>
        <div class="empty-prompt" onclick="quickStart('data-analyst','帮我分析这份业务数据的核心指标')">📊 帮我做数据分析</div>
      </div>
    </div>
  </div>
  <div class="input-area" id="input-area">
    <div class="input-row">
      <textarea class="input-box" id="message-input" placeholder="输入消息，Enter 发送，Shift+Enter 换行..."
        rows="1" onkeydown="handleKeydown(event)" disabled></textarea>
      <button class="send-btn" id="send-btn" onclick="onSendClick()" disabled>➤</button>
    </div>
    <div class="input-hint" id="input-hint">请先选择一位专家</div>
  </div>
</main>

<!-- Error modal -->
<div class="modal-overlay" id="error-modal">
  <div class="modal">
    <h3>⚠️ 连接失败</h3>
    <p id="error-msg">无法连接到服务器，请稍后刷新页面重试。</p>
    <button class="btn-primary" onclick="location.reload()">刷新页面</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  User Token — persist in localStorage
// ════════════════════════════════════════════
function getUserToken() {
  let token = localStorage.getItem('db_usertoken');
  if (!token) {
    token = 'u'+Date.now().toString(36)+Math.random().toString(36).slice(2, 8);
    localStorage.setItem('db_usertoken', token);
  }
  return token;
}

// ════════════════════════════════════════════
//  API helpers
// ════════════════════════════════════════════
const API = {
  token: getUserToken(),

  async fetch(path, opts = {}) {
    const url = '/api' + path;
    const headers = { 'X-User-Token': this.token, ...(opts.headers || {}) };
    const res = await fetch(url, { ...opts, headers });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    return res;
  },

  async get(path) {
    const res = await this.fetch(path);
    return res.json();
  },

  async post(path, body) {
    const res = await this.fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  },

  async delete(path) {
    const res = await this.fetch(path, { method: 'DELETE' });
    return res.json();
  },
};

// ── Global State ──
const S = {
  experts: [],
  currentExpertId: null,
  currentSession: null,
  isStreaming: false,
  abortCtrl: null,
  sidebarTab: 'experts',
};

// ── Init ──
async function init() {
  try {
    const health = await API.get('/health');
    S.experts = await API.get('/experts');
    document.getElementById('footer-status').innerHTML = `<span class="status-dot"></span>就绪 · ${health.experts}位专家在线`;
    document.getElementById('online-badge').style.display = '';
    renderExperts();
    loadSessions();
  } catch (e) {
    document.getElementById('footer-status').innerHTML = '<span style="color:var(--danger)">⚠ 服务器连接失败</span>';
    document.getElementById('error-msg').textContent = '无法连接到服务器：' + e.message;
    document.getElementById('error-modal').classList.add('open');
    document.getElementById('expert-list').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;font-size:11px;">服务器离线</div>';
  }
}

function getExpert(eid) { return S.experts.find(e => e.id === eid || String(e.id) === String(eid)); }

// ── Sidebar ──
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function switchTab(tab) {
  S.sidebarTab = tab;
  document.getElementById('tab-experts').classList.toggle('active', tab==='experts');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  document.getElementById('expert-list').style.display = tab==='experts'?'':'none';
  document.getElementById('session-list').style.display = tab==='history'?'':'none';
  if (tab==='history') loadSessions();
}

function renderExperts() {
  const depts = {};
  S.experts.forEach(e => {
    if (!depts[e.dept]) depts[e.dept] = [];
    depts[e.dept].push(e);
  });
  const deptColors = {
    '统一前台':{c:'var(--accent2)',bg:'rgba(108,99,255,0.15)'},
    '战略与规划':{c:'var(--gold)',bg:'rgba(245,166,35,0.15)'},
    '产品与设计':{c:'var(--coral)',bg:'rgba(255,126,95,0.15)'},
    '研发与工程':{c:'var(--bluepurple)',bg:'rgba(124,106,247,0.15)'},
    '数据与算法':{c:'var(--teal)',bg:'rgba(78,205,196,0.15)'},
    '质量保障':{c:'var(--rose)',bg:'rgba(240,98,146,0.15)'},
    '运维与治理':{c:'var(--slate)',bg:'rgba(92,143,255,0.15)'},
  };
  let h = '';
  for (const [dept, experts] of Object.entries(depts)) {
    const dc = deptColors[dept] || deptColors['研发与工程'];
    h += `<div class="dept-group-title" style="color:${dc.c}">${dept}</div>`;
    experts.forEach(e => {
      const active = S.currentExpertId === e.id ? ' active' : '';
      h += `<div class="expert-list-item${active}" onclick="selectExpert('${e.id}')" id="ei-${e.id}">
        <div class="expert-emoji" style="background:${dc.bg}">${e.emoji}</div>
        <div class="expert-info"><div class="expert-list-name">${esc(e.nameShort)}</div><div class="expert-list-role">#${String(e.num).padStart(2,'0')} ${esc(e.role)}</div></div>
      </div>`;
    });
  }
  document.getElementById('expert-list').innerHTML = h;
}

async function loadSessions() {
  try {
    const sessions = await API.get('/sessions');
    const container = document.getElementById('session-list');
    if (!sessions.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:11px;">暂无历史对话</div>';
      return;
    }
    container.innerHTML = sessions.map(s => {
      const active = S.currentSession && S.currentSession.id === s.id ? ' active' : '';
      const e = getExpert(s.expertId);
      const d = new Date(s.updatedAt);
      const ts = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<div class="session-item${active}" onclick="openSession('${s.id}')" id="si-${s.id}">
        <div class="session-info"><div class="session-title">${esc(s.title)}</div><div class="session-meta">${e ? e.nameShort : '?'} · ${ts}</div></div>
        <button class="session-delete" onclick="event.stopPropagation();delSession('${s.id}')">✕</button>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('session-list').innerHTML = '<div style="text-align:center;color:var(--danger);padding:20px;font-size:11px;">加载失败: '+esc(e.message)+'</div>';
  }
}

async function openSession(sid) {
  try {
    const data = await API.get('/sessions/' + sid);
    S.currentSession = data;
    selectExpert(data.expertId, false);
    const chat = document.getElementById('chat-area');
    document.getElementById('empty-state').style.display = 'none';
    chat.innerHTML = '';
    if (data.messages) {
      data.messages.forEach(m => {
        if (m.role !== 'system') appendMsg(m.role, m.content, m.createdAt);
      });
    }
    scrollBottom();
    updateInput();
    loadSessions();
    document.getElementById('sidebar').classList.remove('open');
  } catch (e) {
    showToast('加载对话失败: ' + e.message);
  }
}

async function delSession(sid) {
  if (!confirm('确定删除这个对话？')) return;
  try {
    await API.delete('/sessions/' + sid);
    if (S.currentSession && S.currentSession.id === sid) { S.currentSession = null; newChat(); }
    loadSessions();
    showToast('对话已删除');
  } catch (e) {
    showToast('删除失败: ' + e.message);
  }
}

// ── Expert selection ──
function selectExpert(eid, createSession = true) {
  S.currentExpertId = eid;
  document.querySelectorAll('.expert-list-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('ei-' + eid);
  if (item) item.classList.add('active');
  updateTopbar();
  updateInput();
  if (createSession && (!S.currentSession || String(S.currentSession.expertId) !== String(eid))) {
    newChat();
  }
  document.getElementById('sidebar').classList.remove('open');
}

function updateTopbar() {
  const e = S.currentExpertId ? getExpert(S.currentExpertId) : null;
  if (e) {
    document.getElementById('topbar-expert').style.display = '';
    document.getElementById('topbar-empty').style.display = 'none';
    document.getElementById('topbar-emoji').textContent = e.emoji;
    document.getElementById('topbar-name').textContent = e.name;
    document.getElementById('topbar-role').textContent = '#' + String(e.num).padStart(2, '0') + ' ' + e.role;
    document.getElementById('btn-clear').disabled = false;
    document.getElementById('btn-share').disabled = false;
  } else {
    document.getElementById('topbar-expert').style.display = 'none';
    document.getElementById('topbar-empty').style.display = '';
    document.getElementById('btn-clear').disabled = true;
    document.getElementById('btn-share').disabled = true;
  }
}

function updateInput() {
  const inp = document.getElementById('message-input');
  const btn = document.getElementById('send-btn');
  const hint = document.getElementById('input-hint');
  const e = S.currentExpertId ? getExpert(S.currentExpertId) : null;
  if (!e) {
    inp.disabled = true; btn.disabled = true;
    hint.textContent = '请先选择一位专家';
  } else if (S.isStreaming) {
    inp.disabled = true; btn.disabled = false;
    hint.textContent = 'AI 正在回复中... 点击按钮停止';
    btn.textContent = '■'; btn.classList.add('stop');
  } else {
    inp.disabled = false; btn.textContent = '➤'; btn.classList.remove('stop');
    hint.textContent = '正在与 ' + e.nameShort + ' 对话 · Enter 发送 · Shift+Enter 换行';
    updateSendBtn();
  }
}

function updateSendBtn() {
  document.getElementById('send-btn').disabled = !document.getElementById('message-input').value.trim() || !S.currentExpertId || S.isStreaming;
}

// ── Chat ──
function newChat() {
  S.currentSession = null;
  S.isStreaming = false;
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('empty-state').style.display = '';
  updateTopbar();
  loadSessions();
  updateInput();
}

function clearChat() {
  if (!S.currentSession) return;
  if (!confirm('确定清空当前对话？这将删除所有消息。')) return;
  delSession(S.currentSession.id);
  newChat();
}

function quickStart(eid, msg) {
  // Support both num and id
  const expert = S.experts.find(e => String(e.id) === String(eid) || e.num === Number(eid) || e.id === eid);
  if (!expert) return showToast('专家未找到: ' + eid);
  selectExpert(expert.id, true);
  setTimeout(() => { document.getElementById('message-input').value = msg; sendMessage(); }, 100);
}

function onSendClick() {
  if (S.isStreaming) { stopStreaming(); return; }
  sendMessage();
}

function stopStreaming() {
  if (S.abortCtrl) { S.abortCtrl.abort(); S.abortCtrl = null; }
  S.isStreaming = false;
  updateInput();
}

async function sendMessage() {
  const inp = document.getElementById('message-input');
  const msg = inp.value.trim();
  if (!msg || S.isStreaming || !S.currentExpertId) return;
  const expert = getExpert(S.currentExpertId);
  if (!expert) return showToast('请先选择一位专家');

  inp.value = '';
  updateSendBtn();
  document.getElementById('empty-state').style.display = 'none';

  S.isStreaming = true;
  updateInput();
  const typingId = showTyping();

  appendMsg('user', msg, Date.now());
  scrollBottom();

  try {
    // Create or use session
    let sid = S.currentSession ? S.currentSession.id : null;

    // Use fetch for SSE (not API helper, we need raw response)
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-User-Token': API.token,
      },
      body: JSON.stringify({
        sessionId: sid,
        expertId: expert.id,
        message: msg,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      throw new Error(err.error || `服务器错误 ${res.status}`);
    }

    // Extract session ID from header
    sid = res.headers.get('X-Session-Id');
    if (!sid) {
      // Parse from SSE data
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    let bubbleEl = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data:')) continue;
        const data = trimmed.slice(5).trim();
        if (data === '[DONE]') continue;
        try {
          const p = JSON.parse(data);
          if (p.error) throw new Error(p.error);
          if (p.sessionId) sid = p.sessionId;
          if (p.content) {
            if (typingId) removeTyping(typingId);
            fullText += p.content;
            if (!bubbleEl) bubbleEl = appendMsg('assistant', '', Date.now());
            bubbleEl.querySelector('.bubble-inner').innerHTML = renderMd(fullText);
            scrollBottom();
          }
        } catch (e) {
          if (e.message && !e.message.includes('JSON')) throw e;
        }
      }
    }

    // Reload the session to get server-side messages
    if (sid) {
      S.currentSession = { id: sid, expertId: expert.id };
      loadSessions();
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      showToast('已停止生成');
    } else {
      if (typingId) removeTyping(typingId);
      appendMsg('assistant', '⚠️ ' + e.message, Date.now());
      showToast('请求失败: ' + e.message);
    }
  } finally {
    if (typingId) removeTyping(typingId);
    S.isStreaming = false;
    S.abortCtrl = null;
    updateInput();
    document.getElementById('footer-status').innerHTML = '<span class="status-dot"></span>就绪 · ' + (expert ? expert.nameShort : '');
    inp.focus();
  }
}

// ── Message UI ──
let midSeq = 0;
function appendMsg(role, content, ts) {
  const chat = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.id = 'm' + (++midSeq);
  const expert = S.currentExpertId ? getExpert(S.currentExpertId) : null;
  div.innerHTML = `<div class="message-avatar">${role === 'user' ? '👤' : (expert ? expert.emoji : '🤖')}</div>
    <div><div class="message-bubble bubble-inner">${role === 'assistant' ? renderMd(content) : esc(content)}</div>
    <div class="message-time" style="text-align:${role === 'user' ? 'right' : 'left'}">${fmt(ts)}</div></div>`;
  chat.appendChild(div);
  return div;
}

function showTyping() {
  const chat = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing-' + Date.now();
  const expert = S.currentExpertId ? getExpert(S.currentExpertId) : null;
  div.innerHTML = `<div class="message-avatar">${expert ? expert.emoji : '🤖'}</div><div class="message-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  scrollBottom();
  return div.id;
}

function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
function scrollBottom() { requestAnimationFrame(() => { const c = document.getElementById('chat-area'); c.scrollTop = c.scrollHeight; }); }

// ── Markdown ──
function renderMd(text) {
  if (!text) return '';
  let h = esc(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<div class="code-block-wrapper"><pre><code class="language-${lang || ''}">${esc(code)}</code></pre><button class="copy-btn" onclick="copyCode(this)">复制</button></div>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^---$/gm, '<hr>');
  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  if (!h.startsWith('<')) h = '<p>' + h + '</p>';
  return h;
}

function copyCode(btn) {
  const code = btn.parentElement.querySelector('pre').textContent;
  navigator.clipboard.writeText(code).then(() => { btn.textContent = '已复制!'; setTimeout(() => { btn.textContent = '复制'; }, 1500); });
}

// ── Utilities ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(ts) { return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Share ──
function shareChat() {
  if (!S.currentSession) return showToast('没有可分享的对话');
  API.get('/sessions/' + S.currentSession.id).then(data => {
    const expert = getExpert(data.expertId);
    let md = '# 你的专属开发管家 · ' + (expert ? expert.name : '对话') + '\n\n';
    if (data.messages) {
      data.messages.forEach(m => {
        md += '**' + (m.role === 'user' ? '👤 我' : '🤖 ' + (expert ? expert.nameShort : '')) + '**：\n' + m.content + '\n\n';
      });
    }
    navigator.clipboard.writeText(md).then(() => showToast('对话已复制为 Markdown ✓')).catch(() => showToast('复制失败'));
  }).catch(() => showToast('加载对话失败'));
}

// ── Keyboard ──
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  setTimeout(() => {
    const i = document.getElementById('message-input');
    i.style.height = 'auto';
    i.style.height = Math.min(i.scrollHeight, 140) + 'px';
    updateSendBtn();
  }, 0);
}

// ── Start ──
init();
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  if (sb.classList.contains('open') && !sb.contains(e.target) && !e.target.classList.contains('menu-toggle'))
    sb.classList.remove('open');
});
</script>
